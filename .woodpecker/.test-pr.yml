steps:
  install:
    image: danlynn/ember-cli:6.11.0-node_24.13
    commands:
      - npm ci
  lint-js:
    image: danlynn/ember-cli:6.11.0-node_24.13
    depends_on: install
    commands:
      - npm run lint:js
  lint-hbs:
    image: danlynn/ember-cli:6.11.0-node_24.13
    depends_on: install
    commands:
      - npm run lint:hbs
  lint-css:
    image: danlynn/ember-cli:6.11.0-node_24.13
    depends_on: install
    commands:
      - npm run lint:css
  test:
    image: danlynn/ember-cli:6.11.0-node_24.13
    depends_on: [lint-js, lint-hbs, lint-css]
    commands:
      - npm run test:ember
when:
  - event: pull_request
